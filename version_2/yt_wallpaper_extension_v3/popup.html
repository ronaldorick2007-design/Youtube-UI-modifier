<!DOCTYPE html>
<html>
<head>
  <title>Wallpaper Engine</title>
  <style>
    body { font-family: Arial; width: 270px; padding: 10px; background: #111; color: white; }
    input, button { width: 100%; margin-top: 5px; padding: 6px; }
    #status { margin-top: 10px; font-size: 12px; color: lightgreen; }
    #wallpaperList { max-height: 160px; overflow-y: auto; margin-top: 10px; border: 1px solid #333; padding:5px;}
    .item { display: flex; justify-content: space-between; align-items: center; padding: 5px; border-bottom: 1px solid #222; cursor: pointer; }
    .item:hover { background: #222; }
    .active { background: #2a2a2a; color: #00ffcc; }
    .deleteBtn { color: red; cursor: pointer; padding: 2px 6px; }
    #currentLabel { font-size: 12px; margin-bottom: 5px; color: #ccc; }
  </style>
</head>
<body>
  <h3>Add Wallpaper</h3>
  <input id="name" placeholder="Name">
  <input id="url" placeholder="Image URL">
  <button id="add">Add</button>

  <div id="wallpaperList"></div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
